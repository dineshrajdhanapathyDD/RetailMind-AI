version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd frontend
        - npm ci
        - echo "VITE_API_URL=$VITE_API_URL" > .env
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*
  environment:
    variables:
      NODE_OPTIONS: "--max-old-space-size=4096"
